<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emotion Detection</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <script src="{{ url_for('static', filename='mywebscript.js') }}"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="page-title">
        <h1 id="page-title">Emotion Detection</h1>
        <label for="textToAnalyze">Text to analyze</label>
        <textarea
          id="textToAnalyze"
          rows="6"
          placeholder="Type a sentence here"
        ></textarea>
        <button type="button" onclick="runEmotionAnalysis()">Analyze</button>
        <p id="system_response" role="status"></p>
      </section>
    </main>
  </body>
</html>
